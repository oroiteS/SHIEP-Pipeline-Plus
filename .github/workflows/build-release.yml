name: Build and Upload Release Assets

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-upload:
    name: Build and Upload (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      BIN_NAME: SHIEP-Pipeline
      VERSION: ${{ github.event.release.tag_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            target_label: linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            target_label: macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            target_label: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust (official rustup)
        run: |
          rustup toolchain install stable --profile minimal --no-self-update --target "${{ matrix.target }}"
          rustc +stable -V
          cargo +stable -V

      - name: Install OpenSSL build deps (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt update
          sudo apt install -y pkg-config libssl-dev

      - name: Install OpenSSL build deps (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if ! brew list --versions pkg-config >/dev/null; then brew install pkg-config; fi
          if ! brew list --versions openssl@3 >/dev/null; then brew install openssl@3; fi
          OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          echo "OPENSSL_DIR=${OPENSSL_PREFIX}" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${OPENSSL_PREFIX}/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Install OpenSSL build deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $OpenSslRoot = "C:\Program Files\OpenSSL-Win64"
          if (-not (Test-Path "$OpenSslRoot\include\openssl\ssl.h")) {
            choco install openssl -y
          }

          $LibRoot = "$OpenSslRoot\lib"
          $LibPair = Get-ChildItem -Path $LibRoot -Recurse -Filter "libssl*.lib" -ErrorAction SilentlyContinue |
            ForEach-Object {
              $Dir = Split-Path -Parent $_.FullName
              $Crypto = Get-ChildItem -Path $Dir -Filter "libcrypto*.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($Crypto) {
                [PSCustomObject]@{
                  Dir = $Dir
                  SslBase = $_.BaseName
                  CryptoBase = $Crypto.BaseName
                }
              }
            } |
            Sort-Object @{ Expression = { if ($_.Dir -like "*\VC\x64\MD*") { 0 } else { 1 } } }, @{ Expression = { $_.SslBase.Length } } |
            Select-Object -First 1

          if (-not $LibPair) {
            $Detected = Get-ChildItem -Path $LibRoot -Recurse -Filter "*.lib" -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
            throw "OpenSSL library pair not found under $LibRoot. Detected libs: $($Detected -join '; ')"
          }

          $OpenSslLibDir = $LibPair.Dir
          $OpenSslLibs = "$($LibPair.SslBase):$($LibPair.CryptoBase)"
          $OpenSslIncludeDir = "$OpenSslRoot\include"

          "OPENSSL_DIR=$OpenSslRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_LIB_DIR=$OpenSslLibDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_INCLUDE_DIR=$OpenSslIncludeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_LIBS=$OpenSslLibs" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build binary
        run: cargo +stable build --locked --release -p ec-cli --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          OUT="${BIN_NAME}-${VERSION}-${{ matrix.target_label }}"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${OUT}"

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $Out = "$env:BIN_NAME-$env:VERSION-${{ matrix.target_label }}.exe"
          Copy-Item "target/${{ matrix.target }}/release/$env:BIN_NAME.exe" "dist/$Out"

      - name: Upload to release (GitHub CLI)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/* --clobber
